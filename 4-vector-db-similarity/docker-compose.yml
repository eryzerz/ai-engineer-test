version: '3.8'

services:
  vector_db:
    # Qdrant is an industry-standard, lightweight vector database
    image: qdrant/qdrant:latest
    container_name: local_qdrant_db
    ports:
      - "6333:6333" # REST API port
      - "6334:6334" # gRPC port for high-performance streaming
    volumes:
      # Mount a local directory to persist the vector data 
      # so it survives container restarts
      - ./qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 2G # Keep the memory constrained as discussed earlier
